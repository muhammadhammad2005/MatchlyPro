version: '3.8'

services:
  matchlypro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matchlypro-resume-matcher
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - matchlypro-network
    volumes:
      - ./logs:/var/log/nginx
    labels:
      - "com.matchlypro.description=Resume Matcher Application"
      - "com.matchlypro.maintainer=MatchlyPro Team"

  # Optional: Add a database service if needed in the future
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: matchlypro-db
  #   environment:
  #     POSTGRES_DB: matchlypro
  #     POSTGRES_USER: matchlypro_user
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - matchlypro-network
  #   restart: unless-stopped

  # Optional: Add Redis for caching if needed
  # redis:
  #   image: redis:7-alpine
  #   container_name: matchlypro-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - matchlypro-network
  #   restart: unless-stopped

networks:
  matchlypro-network:
    driver: bridge
    name: matchlypro-network

