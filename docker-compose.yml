version: '3.8'

services:
  resume-matcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-matcher
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - PORT=80
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - resume-matcher-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a backend service in future if needed
  # backend:
  #   image: node:18-alpine
  #   container_name: resume-matcher-backend
  #   working_dir: /app
  #   volumes:
  #     - ./backend:/app
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - NODE_ENV=development
  #   command: npm run dev
  #   networks:
  #     - resume-matcher-network

  # Optional: Add database service in future if needed
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: resume-matcher-db
  #   environment:
  #     POSTGRES_USER: resume_user
  #     POSTGRES_PASSWORD: resume_password
  #     POSTGRES_DB: resume_matcher
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - resume-matcher-network

networks:
  resume-matcher-network:
    driver: bridge

