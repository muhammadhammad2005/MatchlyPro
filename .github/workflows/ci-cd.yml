name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # For your repository: muhammadhammad2005/MatchlyPro

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate || true

    - name: Check HTML validity (basic)
      run: |
        if [ -f index.html ]; then
          echo "Checking HTML structure..."
          # Basic HTML validation using tidy-html5 if available
          if command -v tidy &> /dev/null; then
            tidy -q -errors index.html 2>&1 | head -20 || true
          fi
        fi

    - name: Check for broken links
      run: |
        if command -v linkchecker &> /dev/null; then
          linkchecker --check-extern index.html || true
        else
          echo "Linkchecker not installed, skipping..."
        fi

  build-docker:
    name: Build Docker Image (Multi-Architecture)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU for multi-architecture builds
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:master
          network=host

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image (multi-arch)
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: true

    - name: Scan built image with Trivy
      if: github.event_name != 'pull_request'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-container-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload container scan results
      if: github.event_name != 'pull_request'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-container-results.sarif'

    - name: Generate build summary
      if: always()
      run: |
        echo "# Docker Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Build Details:" >> $GITHUB_STEP_SUMMARY
        echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
        echo "- **Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Security:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Multi-architecture support" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ SBOM generation" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Container vulnerability scanning" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> Image available at: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Pull Vercel Environment Information
      run: |
        vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Build Project
      run: |
        vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Deploy to Vercel
      id: deploy
      run: |
        DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
        echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
        echo "Deployment URL: $DEPLOYMENT_URL"
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Run Vercel deployment checks
      run: |
        # Check if deployment is accessible
        if [ -n "${{ steps.deploy.outputs.deployment_url }}" ]; then
          echo "Testing deployment accessibility..."
          curl -f -s -o /dev/null -w "HTTP Status: %{http_code}\n" "${{ steps.deploy.outputs.deployment_url }}/health" || true
          curl -f -s -o /dev/null -w "HTTP Status: %{http_code}\n" "${{ steps.deploy.outputs.deployment_url }}" || true
        fi

    - name: Create deployment summary
      if: always()
      run: |
        echo "# Vercel Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Deployment Details:" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -n "${{ steps.deploy.outputs.deployment_url }}" ]; then
          echo "## Deployment URL:" >> $GITHUB_STEP_SUMMARY
          echo "- **Production URL:** [${{ steps.deploy.outputs.deployment_url }}](${{ steps.deploy.outputs.deployment_url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Quick Links:" >> $GITHUB_STEP_SUMMARY
          echo "- [Health Check](${{ steps.deploy.outputs.deployment_url }}/health)" >> $GITHUB_STEP_SUMMARY
          echo "- [Main Application](${{ steps.deploy.outputs.deployment_url }})" >> $GITHUB_STEP_SUMMARY
        else
          echo "## ❌ Deployment failed or URL not available" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Security Checks:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ All security scans passed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Code quality checks passed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> Deployment completed at $(date -u)" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner (filesystem)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
        exit-code: 0

    - name: Run Trivy vulnerability scanner (container image)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'nginx:alpine'
        format: 'sarif'
        output: 'trivy-image-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: 0

    - name: Run Grype vulnerability scanner
      uses: anchore/scan-action@v3
      with:
        path: "."
        fail-build: false
        output-format: "sarif"
        severity-cutoff: "medium"

    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      if: env.SNYK_TOKEN != ''
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --fail-on=upgradable

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'MatchlyPro'
        path: '.'
        format: 'SARIF'
        out: 'dependency-check-report.sarif'
        args: '--enableRetired'

    - name: Run Semgrep SAST scan
      uses: returntocorp/semgrep-action@v1
      with:
        config: p/security-audit
        output: 'semgrep-results.sarif'

    - name: Run Hadolint for Dockerfile linting
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: 'Dockerfile'
        output-format: 'sarif'
        output-file: 'hadolint-results.sarif'

    - name: Run Checkov for infrastructure as code scanning
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: .
        output_format: sarif
        output_file_path: checkov-results.sarif
        quiet: true

    - name: Run Secret scanning with Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      with:
        config-path: .gitleaks.toml
        redact: true
        format: sarif
        output: gitleaks-results.sarif

    - name: Upload security scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: |
          trivy-results.sarif
          trivy-image-results.sarif
          grype-report.sarif
          dependency-check-report.sarif
          semgrep-results.sarif
          hadolint-results.sarif
          checkov-results.sarif
          gitleaks-results.sarif

    - name: Generate security scan summary
      if: always()
      run: |
        echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Tools Executed:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Trivy (filesystem)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Trivy (container image)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Grype" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Snyk" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ OWASP Dependency Check" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Semgrep SAST" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Hadolint (Dockerfile)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Checkov (IaC)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Gitleaks (Secrets)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Results uploaded to GitHub Security tab" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> **Note:** Review findings in the Security tab of your repository." >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test, build-docker, deploy-vercel, security-scan]
    if: always()
    
    steps:
    - name: Determine workflow status
      id: check-status
      run: |
        # Check all job results
        if [[ "${{ needs.test.result }}" == "success" && \
              "${{ needs.build-docker.result }}" == "success" && \
              "${{ needs.security-scan.result }}" == "success" ]]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "message=✅ All checks passed successfully! Pipeline completed." >> $GITHUB_OUTPUT
          echo "emoji=✅" >> $GITHUB_OUTPUT
        elif [[ "${{ needs.deploy-vercel.result }}" == "success" ]]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "message=✅ Deployment to Vercel successful! Application is live." >> $GITHUB_OUTPUT
          echo "emoji=🚀" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "message=❌ Some checks failed. Please review the logs." >> $GITHUB_OUTPUT
          echo "emoji=❌" >> $GITHUB_OUTPUT
        fi
        
        # Create summary message
        echo "summary=Test: ${{ needs.test.result }}, Build: ${{ needs.build-docker.result }}, Security: ${{ needs.security-scan.result }}, Deploy: ${{ needs.deploy-vercel.result }}" >> $GITHUB_OUTPUT
        echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
        echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

    - name: Send WhatsApp notification via Twilio
      if: env.TWILIO_ACCOUNT_SID != '' && env.TWILIO_AUTH_TOKEN != '' && env.TWILIO_WHATSAPP_FROM != '' && env.WHATSAPP_TO != ''
      uses: twilio-labs/actions-sms@v1
      with:
        from: ${{ env.TWILIO_WHATSAPP_FROM }}
        to: ${{ env.WHATSAPP_TO }}
        body: |
          ${{ steps.check-status.outputs.emoji }} GitHub Actions - ${{ github.repository }}
          
          Status: ${{ steps.check-status.outputs.status }}
          Branch: ${{ github.ref_name }}
          
          ${{ steps.check-status.outputs.message }}
          
          Details: ${{ steps.check-status.outputs.run_url }}
          
          ${{ steps.check-status.outputs.summary }}
      env:
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
        WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}

    - name: Send WhatsApp notification via CallMeBot (Alternative)
      if: env.CALLMEBOT_API_KEY != '' && env.WHATSAPP_PHONE != ''
      run: |
        STATUS_EMOJI="${{ steps.check-status.outputs.emoji }}"
        STATUS_MESSAGE="${{ steps.check-status.outputs.message }}"
        REPO_NAME="${{ github.repository }}"
        BRANCH_NAME="${{ github.ref_name }}"
        RUN_URL="${{ steps.check-status.outputs.run_url }}"
        
        # URL encode the message
        MESSAGE="${STATUS_EMOJI} GitHub Actions - ${REPO_NAME}%0A%0AStatus: ${{ steps.check-status.outputs.status }}%0ABranch: ${BRANCH_NAME}%0A%0A${STATUS_MESSAGE}%0A%0ADetails: ${RUN_URL}"
        
        # Send via CallMeBot API
        curl -X POST \
          "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.WHATSAPP_PHONE }}&text=${MESSAGE}&apikey=${{ secrets.CALLMEBOT_API_KEY }}"
      env:
        CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}

    - name: Send email notification
      if: env.SMTP_USER != '' && env.SMTP_PASS != ''
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.SMTP_USER }}
        password: ${{ secrets.SMTP_PASS }}
        subject: "GitHub Actions: ${{ steps.check-status.outputs.status }} - ${{ github.repository }}"
        to: muhammadhammad.020050@gmail.com
        from: GitHub Actions <${{ secrets.SMTP_USER }}>
        body: |
          GitHub Actions Workflow Status
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Status: ${{ steps.check-status.outputs.status }}
          
          ${{ steps.check-status.outputs.message }}
          
          Job Results:
          - Test: ${{ needs.test.result }}
          - Build Docker: ${{ needs.build-docker.result }}
          - Security Scan: ${{ needs.security-scan.result }}
          - Deploy Vercel: ${{ needs.deploy-vercel.result }}
          
          View details: ${{ steps.check-status.outputs.run_url }}
          
          ---
          This is an automated notification from GitHub Actions.
          
    - name: Send email notification via GitHub CLI (alternative)
      if: env.GITHUB_TOKEN != ''
      run: |
        STATUS="${{ steps.check-status.outputs.status }}"
        MESSAGE="${{ steps.check-status.outputs.message }}"
        REPO="${{ github.repository }}"
        BRANCH="${{ github.ref_name }}"
        RUN_URL="${{ steps.check-status.outputs.run_url }}"
        
        # Create email body
        EMAIL_BODY="GitHub Actions Workflow Status
        
        Repository: $REPO
        Branch: $BRANCH
        Commit: ${{ github.sha }}
        Status: $STATUS
        
        $MESSAGE
        
        Job Results:
        - Test: ${{ needs.test.result }}
        - Build Docker: ${{ needs.build-docker.result }}
        - Security Scan: ${{ needs.security-scan.result }}
        - Deploy Vercel: ${{ needs.deploy-vercel.result }}
        
        View details: $RUN_URL
        
        ---
        This is an automated notification from GitHub Actions."
        
        echo "$EMAIL_BODY" | mail -s "GitHub Actions: $STATUS - $REPO" muhammadhammad.020050@gmail.com || echo "Mail command not available, skipping..."

    - name: Create workflow summary
      run: |
        echo "# Workflow Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## ${{ steps.check-status.outputs.emoji }} Status: ${{ steps.check-status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.check-status.outputs.message }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Build Docker: ${{ needs.build-docker.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Deploy Vercel: ${{ needs.deploy-vercel.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Details:" >> $GITHUB_STEP_SUMMARY
        echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- Run URL: ${{ steps.check-status.outputs.run_url }}" >> $GITHUB_STEP_SUMMARY