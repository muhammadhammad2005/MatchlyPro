name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # For your repository: muhammadhammad2005/MatchlyPro

jobs:
  test:
    name: Test and Basic Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

    - name: Validate file structure
      run: |
        echo "Validating project structure..."
        echo "Checking required files..."
        [ -f index.html ] && echo "✓ index.html exists" || echo "✗ index.html missing"
        [ -f package.json ] && echo "✓ package.json exists" || echo "✗ package.json missing"
        [ -f Dockerfile ] && echo "✓ Dockerfile exists" || echo "✗ Dockerfile missing"
        [ -f vercel.json ] && echo "✓ vercel.json exists" || echo "✗ vercel.json missing"
        [ -f health.html ] && echo "✓ health.html exists" || echo "✗ health.html missing"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate build summary
      if: always()
      run: |
        echo "# Docker Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Build Details:" >> $GITHUB_STEP_SUMMARY
        echo "- **Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> Image available at: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Pull Vercel Environment Information
      run: |
        vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Build Project
      run: |
        vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Deploy to Vercel
      id: deploy
      run: |
        DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
        echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
        echo "Deployment URL: $DEPLOYMENT_URL"
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Run Vercel deployment checks
      run: |
        # Check if deployment is accessible
        if [ -n "${{ steps.deploy.outputs.deployment_url }}" ]; then
          echo "Testing deployment accessibility..."
          curl -f -s -o /dev/null -w "HTTP Status: %{http_code}\n" "${{ steps.deploy.outputs.deployment_url }}/health" || true
          curl -f -s -o /dev/null -w "HTTP Status: %{http_code}\n" "${{ steps.deploy.outputs.deployment_url }}" || true
        fi

    - name: Create deployment summary
      if: always()
      run: |
        echo "# Vercel Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Deployment Details:" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -n "${{ steps.deploy.outputs.deployment_url }}" ]; then
          echo "## Deployment URL:" >> $GITHUB_STEP_SUMMARY
          echo "- **Production URL:** [${{ steps.deploy.outputs.deployment_url }}](${{ steps.deploy.outputs.deployment_url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Quick Links:" >> $GITHUB_STEP_SUMMARY
          echo "- [Health Check](${{ steps.deploy.outputs.deployment_url }}/health)" >> $GITHUB_STEP_SUMMARY
          echo "- [Main Application](${{ steps.deploy.outputs.deployment_url }})" >> $GITHUB_STEP_SUMMARY
        else
          echo "## ❌ Deployment failed or URL not available" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Security Checks:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Snyk security scan passed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Code quality checks passed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> Deployment completed at $(date -u)" >> $GITHUB_STEP_SUMMARY


  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test, build-docker, deploy-vercel]
    if: always()
    
    steps:
    - name: Determine workflow status
      id: check-status
      run: |
        # Check all job results
        if [[ "${{ needs.test.result }}" == "success" && \
              "${{ needs.build-docker.result }}" == "success" && \
              "${{ needs.deploy-vercel.result }}" == "success" ]]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "message=✅ All checks passed successfully! Pipeline completed." >> $GITHUB_OUTPUT
          echo "emoji=✅" >> $GITHUB_OUTPUT
        elif [[ "${{ needs.deploy-vercel.result }}" == "success" ]]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "message=✅ Deployment to Vercel successful! Application is live." >> $GITHUB_OUTPUT
          echo "emoji=🚀" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "message=❌ Some checks failed. Please review the logs." >> $GITHUB_OUTPUT
          echo "emoji=❌" >> $GITHUB_OUTPUT
        fi
        
        # Create summary message
        echo "summary=Test: ${{ needs.test.result }}, Build: ${{ needs.build-docker.result }}, Deploy: ${{ needs.deploy-vercel.result }}" >> $GITHUB_OUTPUT
        echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
        echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

    - name: Send email notification
      if: env.SMTP_USER != '' && env.SMTP_PASS != ''
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.SMTP_USER }}
        password: ${{ secrets.SMTP_PASS }}
        subject: "GitHub Actions: ${{ steps.check-status.outputs.status }} - ${{ github.repository }}"
        to: muhammadhammad.020050@gmail.com
        from: GitHub Actions <${{ secrets.SMTP_USER }}>
        body: |
          GitHub Actions Workflow Status
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Status: ${{ steps.check-status.outputs.status }}
          
          ${{ steps.check-status.outputs.message }}
          
          Job Results:
          - Test: ${{ needs.test.result }}
          - Build Docker: ${{ needs.build-docker.result }}
          - Deploy Vercel: ${{ needs.deploy-vercel.result }}
          
          View details: ${{ steps.check-status.outputs.run_url }}
          
          ---
          This is an automated notification from GitHub Actions.
          
    - name: Create workflow summary
      run: |
        echo "# Workflow Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## ${{ steps.check-status.outputs.emoji }} Status: ${{ steps.check-status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.check-status.outputs.message }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Build Docker: ${{ needs.build-docker.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Deploy Vercel: ${{ needs.deploy-vercel.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Details:" >> $GITHUB_STEP_SUMMARY
        echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- Run URL: ${{ steps.check-status.outputs.run_url }}" >> $GITHUB_STEP_SUMMARY