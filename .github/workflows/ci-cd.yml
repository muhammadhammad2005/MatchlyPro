name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # For your repository: muhammadhammad2005/Matchly

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate || true

    - name: Check HTML validity (basic)
      run: |
        if [ -f index.html ]; then
          echo "Checking HTML structure..."
          # Basic HTML validation using tidy-html5 if available
          if command -v tidy &> /dev/null; then
            tidy -q -errors index.html 2>&1 | head -20 || true
          fi
        fi

    - name: Check for broken links
      run: |
        if command -v linkchecker &> /dev/null; then
          linkchecker --check-extern index.html || true
        else
          echo "Linkchecker not installed, skipping..."
        fi

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        working-directory: ./

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Run Grype vulnerability scanner
      uses: anchore/scan-action@v3
      with:
        path: "."
        fail-build: false
        output-format: "sarif"
        severity-cutoff: "medium"

    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      if: env.SNYK_TOKEN != ''
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'Matchly'
        path: '.'
        format: 'SARIF'
        out: 'dependency-check-report.sarif'

    - name: Upload security scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: |
          trivy-results.sarif
          grype-report.sarif
          dependency-check-report.sarif

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test, build-docker, deploy-vercel, security-scan]
    if: always()
    
    steps:
    - name: Determine workflow status
      id: check-status
      run: |
        # Check all job results
        if [[ "${{ needs.test.result }}" == "success" && \
              "${{ needs.build-docker.result }}" == "success" && \
              "${{ needs.security-scan.result }}" == "success" ]]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "message=✅ All checks passed successfully! Pipeline completed." >> $GITHUB_OUTPUT
          echo "emoji=✅" >> $GITHUB_OUTPUT
        elif [[ "${{ needs.deploy-vercel.result }}" == "success" ]]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "message=✅ Deployment to Vercel successful! Application is live." >> $GITHUB_OUTPUT
          echo "emoji=🚀" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "message=❌ Some checks failed. Please review the logs." >> $GITHUB_OUTPUT
          echo "emoji=❌" >> $GITHUB_OUTPUT
        fi
        
        # Create summary message
        echo "summary=Test: ${{ needs.test.result }}, Build: ${{ needs.build-docker.result }}, Security: ${{ needs.security-scan.result }}, Deploy: ${{ needs.deploy-vercel.result }}" >> $GITHUB_OUTPUT
        echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
        echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

    - name: Send WhatsApp notification via Twilio
      if: env.TWILIO_ACCOUNT_SID != '' && env.TWILIO_AUTH_TOKEN != '' && env.TWILIO_WHATSAPP_FROM != '' && env.WHATSAPP_TO != ''
      uses: twilio-labs/actions-sms@v1
      with:
        from: ${{ env.TWILIO_WHATSAPP_FROM }}
        to: ${{ env.WHATSAPP_TO }}
        body: |
          ${{ steps.check-status.outputs.emoji }} GitHub Actions - ${{ github.repository }}
          
          Status: ${{ steps.check-status.outputs.status }}
          Branch: ${{ github.ref_name }}
          
          ${{ steps.check-status.outputs.message }}
          
          Details: ${{ steps.check-status.outputs.run_url }}
          
          ${{ steps.check-status.outputs.summary }}
      env:
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
        WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}

    - name: Send WhatsApp notification via CallMeBot (Alternative)
      if: env.CALLMEBOT_API_KEY != '' && env.WHATSAPP_PHONE != ''
      run: |
        STATUS_EMOJI="${{ steps.check-status.outputs.emoji }}"
        STATUS_MESSAGE="${{ steps.check-status.outputs.message }}"
        REPO_NAME="${{ github.repository }}"
        BRANCH_NAME="${{ github.ref_name }}"
        RUN_URL="${{ steps.check-status.outputs.run_url }}"
        
        # URL encode the message
        MESSAGE="${STATUS_EMOJI} GitHub Actions - ${REPO_NAME}%0A%0AStatus: ${{ steps.check-status.outputs.status }}%0ABranch: ${BRANCH_NAME}%0A%0A${STATUS_MESSAGE}%0A%0ADetails: ${RUN_URL}"
        
        # Send via CallMeBot API
        curl -X POST \
          "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.WHATSAPP_PHONE }}&text=${MESSAGE}&apikey=${{ secrets.CALLMEBOT_API_KEY }}"
      env:
        CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}

    - name: Send email notification (fallback)
      if: env.SMTP_USER != '' && env.SMTP_PASS != '' && env.EMAIL_TO != ''
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.SMTP_USER }}
        password: ${{ secrets.SMTP_PASS }}
        subject: "GitHub Actions: ${{ steps.check-status.outputs.status }} - ${{ github.repository }}"
        to: ${{ secrets.EMAIL_TO }}
        from: GitHub Actions <${{ secrets.SMTP_USER }}>
        body: |
          GitHub Actions Workflow Status
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Status: ${{ steps.check-status.outputs.status }}
          
          ${{ steps.check-status.outputs.message }}
          
          Job Results:
          - Test: ${{ needs.test.result }}
          - Build Docker: ${{ needs.build-docker.result }}
          - Security Scan: ${{ needs.security-scan.result }}
          - Deploy Vercel: ${{ needs.deploy-vercel.result }}
          
          View details: ${{ steps.check-status.outputs.run_url }}
          
          ---
          This is an automated notification from GitHub Actions.

    - name: Create workflow summary
      run: |
        echo "# Workflow Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## ${{ steps.check-status.outputs.emoji }} Status: ${{ steps.check-status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.check-status.outputs.message }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Build Docker: ${{ needs.build-docker.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Deploy Vercel: ${{ needs.deploy-vercel.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Details:" >> $GITHUB_STEP_SUMMARY
        echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- Run URL: ${{ steps.check-status.outputs.run_url }}" >> $GITHUB_STEP_SUMMARY