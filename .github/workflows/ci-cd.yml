name: Production CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  IMAGE_NAME: resume-matcher
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project structure
        run: npm run lint

      - name: Run static smoke tests
        run: npm test

      - name: Upload validation summary
        if: always()
        run: |
          echo "# Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm ci completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Project validation passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Static smoke tests passed" >> "$GITHUB_STEP_SUMMARY"

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Snyk dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --all-projects

      - name: Security summary
        if: always()
        run: |
          echo "# Security Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm audit executed at high severity threshold" >> "$GITHUB_STEP_SUMMARY"
          echo "- Snyk dependency scan executed" >> "$GITHUB_STEP_SUMMARY"

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs:
      - quality
      - security
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build production container
        run: docker build --target production --tag resume-matcher:ci .

      - name: Run container
        run: docker run -d --name resume-matcher-ci -p 8080:8080 resume-matcher:ci

      - name: Verify container health endpoint
        run: |
          for attempt in {1..15}; do
            if curl -fsS http://127.0.0.1:8080/health > /dev/null; then
              echo "Container health endpoint is reachable."
              exit 0
            fi
            sleep 2
          done
          echo "Container health endpoint did not become ready in time."
          docker logs resume-matcher-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f resume-matcher-ci

  docker-publish:
    name: Publish Container Images
    runs-on: ubuntu-latest
    needs:
      - docker-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_IMAGE }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push multi-platform images
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Container publish summary
        if: always()
        run: |
          echo "# Container Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- GHCR image: \`${{ env.REGISTRY_IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker Hub image: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags: ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-vercel:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    needs:
      - quality
      - security
      - docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt output
        id: deploy
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $deployment_url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify production deployment
        run: |
          deployment_url="${{ steps.deploy.outputs.deployment_url }}"
          curl -fsS "$deployment_url" > /dev/null
          curl -fsS "$deployment_url/health" > /dev/null

      - name: Deployment summary
        if: always()
        run: |
          echo "# Vercel Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production URL: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment strategy: CLI prebuilt deploy after successful pipeline gates" >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
    needs:
      - quality
      - security
      - docker-smoke
      - docker-publish
      - deploy-vercel
    if: always()

    steps:
      - name: Compute pipeline status
        id: status
        run: |
          if [[ "${{ needs.quality.result }}" == "success" && \
                "${{ needs.security.result }}" == "success" && \
                "${{ needs.docker-smoke.result }}" == "success" && \
                ( "${{ needs.docker-publish.result }}" == "success" || "${{ needs.docker-publish.result }}" == "skipped" ) && \
                ( "${{ needs.deploy-vercel.result }}" == "success" || "${{ needs.deploy-vercel.result }}" == "skipped" ) ]]; then
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "message=Pipeline completed successfully." >> "$GITHUB_OUTPUT"
          else
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "message=Pipeline failed. Review the workflow logs before deploying again." >> "$GITHUB_OUTPUT"
          fi

      - name: Send email notification
        if: always() && env.SMTP_USER != '' && env.SMTP_PASS != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "[${{ steps.status.outputs.state }}] ${{ github.repository }} CI/CD"
          to: ${{ env.SMTP_USER }}
          from: GitHub Actions <${{ env.SMTP_USER }}>
          body: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Quality Gate: ${{ needs.quality.result }}
            Security Checks: ${{ needs.security.result }}
            Docker Smoke Test: ${{ needs.docker-smoke.result }}
            Docker Publish: ${{ needs.docker-publish.result }}
            Vercel Deploy: ${{ needs.deploy-vercel.result }}

            ${{ steps.status.outputs.message }}
            Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Write final summary
        run: |
          echo "# Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ steps.status.outputs.state }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Quality Gate: ${{ needs.quality.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Security Checks: ${{ needs.security.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker Smoke Test: ${{ needs.docker-smoke.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker Publish: ${{ needs.docker-publish.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vercel Deploy: ${{ needs.deploy-vercel.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.status.outputs.message }}" >> "$GITHUB_STEP_SUMMARY"
