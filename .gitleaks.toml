title = "MatchlyPro Secret Detection"

[extend]
useDefault = true

[[rules]]
id = "vercel-api-token"
description = "Vercel API Token"
regex = '''\b[a-z0-9]{24}_[a-z0-9]{27}\b'''
tags = ["key", "Vercel"]

[[allowlists]]
description = "Ignore gitleaks config and markdown documentation"
paths = [
  '''^\.gitleaks\.toml$''',
  '''^README\.md$''',
  '''^CONTRIBUTING\.md$''',
  '''^LICENSE$'''
]

[[allowlists]]
description = "Ignore lockfiles and generated metadata that may trigger false positives"
paths = [
  '''^package-lock\.json$''',
  '''^node_modules/.*'''
]
